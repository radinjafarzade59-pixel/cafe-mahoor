<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>کافه ماهور</title>

<style>
body{
  margin:0;
  font-family:Tahoma;
  background:#120f0d;
  color:#f5f1ea;
}

/* HEADER */
header{
  text-align:center;
  padding:25px;
  font-size:32px;
  background:#2b211b;
  border-bottom:2px solid #c89b5a;
  letter-spacing:1px;
}

/* MENU GRID */
.menu{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

/* CATEGORY */
.cat-title{
  margin:35px 0 10px;
  font-size:20px;
  color:#c89b5a;
  border-right:4px solid #c89b5a;
  padding-right:10px;
  animation: fadeIn 0.5s ease;
}

/* ITEMS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
}

.card{
  background:#1f1915;
  border:1px solid #2f241e;
  padding:12px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
  transition:0.25s;
  animation: pop 0.3s ease;
}

.card:hover{
  transform:translateY(-5px);
  border-color:#c89b5a;
  box-shadow:0 6px 18px rgba(0,0,0,0.5);
  color:#fff;
}

/* DETAIL PAGE */
.detail{
  display:none;
  max-width:850px;
  margin:auto;
  padding:25px;
  line-height:2;
  animation: fadeIn 0.4s ease;
}

.back{
  margin-top:20px;
  display:inline-block;
  padding:10px 15px;
  background:#c89b5a;
  color:#000;
  border-radius:8px;
  cursor:pointer;
}

/* ANIMATIONS */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes pop{
  from{transform:scale(0.95); opacity:0;}
  to{transform:scale(1); opacity:1;}
}
</style>
</head>

<body>

<header>کافه ماهور</header>

<div class="menu" id="menu"></div>

<div class="detail" id="detailBox">
  <h2 id="title"></h2>
  <p id="desc"></p>
  <div class="back" onclick="goBack()">بازگشت</div>
</div>

<script>

},

},

},

},

panini:{

},

stroganoff:{

},

crepe:{

title:"کرپ",
desc:"غذای نازک با مواد شیرین یا گوشتی."
}

};

/* BUILD MENU */
const menu = document.getElementById("menu");

let lastCat="";

for(let key in data){

if(data[key].cat !== lastCat){
  let cat = document.createElement("div");
  cat.className="cat-title";
  cat.innerText=data[key].cat;
  menu.appendChild(cat);
  lastCat=data[key].cat;
}

let div = document.createElement("div");
div.className="card";
div.innerText=data[key].title;
div.onclick=()=>openItem(key);
menu.appendChild(div);

}

function openItem(key){
document.getElementById("menu").style.display="none";
document.getElementById("detailBox").style.display="block";
document.getElementById("title").innerText=data[key].title;
document.getElementById("desc").innerText=data[key].desc;
}

function goBack(){
document.getElementById("menu").style.display="block";
document.getElementById("detailBox").style.display="none";
}

</script>

</body>
</html>
